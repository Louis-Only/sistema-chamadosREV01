<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Chamados</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS personalizado -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <main class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-sistema">
        <section class="card card-formulario shadow-sm">
            <div class="card-body p-5">

                <div class="mb-4">
                    <h1 class="titulo-formulario">Entrar</h1>
                    <p class="texto-sistema mb-0">
                        Acesse com seu e-mail e senha.
                    </p>
                </div>

                <form id="formLogin">
                    <div class="mb-3">
                        <label for="email" class="form-label">E-mail</label>
                        <input 
                            type="email" 
                            class="form-control" 
                            id="email" 
                            name="email" 
                            placeholder="seu@email.com"
                            required
                        >
                    </div>

                    <div class="mb-4">
                        <label for="senha" class="form-label">Senha</label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="senha" 
                            name="senha" 
                            placeholder="Digite sua senha"
                            required
                        >
                    </div>

                    <div id="mensagemLogin" class="mb-3"></div>

                    <div class="d-grid mb-4">
                        <button type="submit" class="btn btn-dark btn-lg">
                            Entrar
                        </button>
                    </div>
                </form>

                <p class="text-center mb-0">
                    Não tem conta?
                    <a href="cadastro.html" class="link-sistema">Cadastre-se</a>
                </p>

                <div class="text-center mt-3">
                    <a href="index.html" class="link-voltar">Voltar para início</a>
                </div>

            </div>
        </section>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript personalizado -->
    <script src="assets/js/validacoes.js"></script>
    <script src="assets/js/ajax.js"></script>

</body>
</html>
