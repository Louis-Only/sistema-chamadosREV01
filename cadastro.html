<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema de Chamados</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS personalizado -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <main class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-sistema py-4">
        <section class="card card-cadastro shadow-sm">
            <div class="card-body p-5">

                <div class="mb-4">
                    <h1 class="titulo-formulario">Criar conta</h1>
                    <p class="texto-sistema mb-0">
                        Preencha seus dados para se cadastrar.
                    </p>
                </div>

                <form id="formCadastro">
                    <div class="mb-3">
                        <label for="nome" class="form-label">Nome completo</label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="nome" 
                            name="nome" 
                            placeholder="João da Silva"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="emailCadastro" class="form-label">E-mail</label>
                        <input 
                            type="email" 
                            class="form-control" 
                            id="emailCadastro" 
                            name="email" 
                            placeholder="seu@email.com"
                            required
                        >
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="telefone" class="form-label">Telefone</label>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="telefone" 
                                name="telefone" 
                                placeholder="(11) 90000-0000"
                                maxlength="15"
                                inputmode="numeric"
                                required
                            >
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="cpf" class="form-label">CPF</label>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="cpf" 
                                name="cpf" 
                                placeholder="000.000.000-00"
                                maxlength="14"
                                inputmode="numeric"
                                required
                            >
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="senhaCadastro" class="form-label">Senha</label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="senhaCadastro" 
                            name="senha" 
                            placeholder="Digite sua senha"
                            required
                        >
                    </div>

                    <div class="mb-4">
                        <label for="confirmarSenha" class="form-label">Confirmar senha</label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="confirmarSenha" 
                            name="confirmarSenha" 
                            placeholder="Confirme sua senha"
                            required
                        >
                    </div>

                    <div id="mensagemCadastro" class="mb-3"></div>

                    <div class="d-grid mb-4">
                        <button type="submit" class="btn btn-dark btn-lg">
                            Cadastrar
                        </button>
                    </div>
                </form>

                <p class="text-center mb-0">
                    Já tem conta?
                    <a href="login.html" class="link-sistema">Entrar</a>
                </p>

                <div class="text-center mt-3">
                    <a href="index.html" class="link-voltar">Voltar para início</a>
                </div>

            </div>
        </section>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript personalizado -->
    <script src="assets/js/validacoes.js"></script>
    <script src="assets/js/ajax.js"></script>

</body>
</html>
